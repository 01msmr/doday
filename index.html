<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover: nutzt auf dem iPhone die volle Fläche (Notch-Bereich) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Browser-Chrome-Farbe folgt dem Hell/Dunkel-Modus des Geräts -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f3f0e9" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#16171b" />
    <!-- App-Icon: Homescreen-Icon fürs iPhone ("Zum Home-Bildschirm") und Favicon
         für Browser-Tabs – beide aus public/app-icon-1024.png verkleinert -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <!-- macOS Safari „Zum Dock hinzufügen" maskiert NICHT selbst (anders als iOS).
         Daher ein vorgeformtes Squircle-Icon (mit transparentem Rand) als großer
         Icon-Hinweis – Browser nehmen für Tabs weiter favicon-32, der Dock das 1024er. -->
    <link rel="icon" type="image/png" sizes="1024x1024" href="/icon-mac-1024.png" />
    <!-- PWA: Vollbild-Start vom Homescreen. Das Manifest gilt für alle Browser,
         die apple-* Meta-Tags sorgen auf iOS zuverlässig fürs Vollbild. -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Do Day</title>
  </head>
  <body>
    <div id="app"></div>
    <!-- Vite lädt TypeScript direkt – kein Build-Schritt im Dev-Modus nötig -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
