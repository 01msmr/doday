# Service-Block für die bestehende docker-compose.yml auf dem Docker-Rechner.
# Werte (Netzwerk "traefik", certresolver "letsencrypt", entrypoint "websecure")
# entsprechen dem vorhandenen Setup der anderen Dienste (z. B. cd.msmr.co).
#
# Wichtig: Der /dav-Rewrite aus dem ursprünglichen Konzept entfällt!
# Das Backend spricht serverseitig mit der Nextcloud – der Browser nur mit /api.
services:
  doday:
    # Variante A: lokal bauen     → docker compose up -d --build doday
    build: ./doday
    # Variante B: später via GHCR → image: ghcr.io/<github-user>/doday:latest
    restart: unless-stopped
    env_file: ./doday/.env # NEXTCLOUD_URL, NEXTCLOUD_USER, NEXTCLOUD_APP_PASSWORD, …
    networks:
      - traefik
    # Backend ruft serverseitig cd.msmr.co auf. Damit ein wackeliger Heim-DNS
    # (split-horizon: cd.msmr.co → ucloud.fritz.box → LAN-IP) die App nicht
    # lahmlegt, die IP fest verdrahten – das TLS-Zertifikat bleibt für
    # cd.msmr.co gültig (verbunden wird nur per IP, SNI/Host unverändert):
    extra_hosts:
      - "cd.msmr.co:10.0.10.100" # LAN-IP des Servers (Traefik/Nextcloud)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.doday.rule=Host(`do.msmr.co`)"
      - "traefik.http.routers.doday.tls.certresolver=letsencrypt"
      - "traefik.http.routers.doday.entrypoints=websecure"
      - "traefik.http.routers.doday.tls.domains[0].main=do.msmr.co"
      # Port IM Container (doday-Backend lauscht auf 3000 – kein ports:-Mapping nötig)
      - "traefik.http.services.doday.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik"
      # Zugriffsschutz per Basic Auth (Traefik fragt Benutzer/Passwort ab, BEVOR
      # die Anfrage die App erreicht). Hash erzeugen: htpasswd -nB <name>
      # Achtung: jedes $ im Hash muss in Compose als $$ geschrieben werden!
      #   htpasswd -nB uli | sed 's/\$/$$/g'
      # - "traefik.http.middlewares.doday-auth.basicauth.users=uli:$$2y$$05$$BEISPIELHASH"
      # - "traefik.http.routers.doday.middlewares=doday-auth"
      # Bei aktivem Basic Auth: damit iOS das PWA-Icon laden kann, einen zweiten
      # Router NUR für die Icon-/Manifest-Dateien OHNE Auth-Middleware ergänzen:
      # - "traefik.http.routers.doday-pwa.rule=Host(`do.msmr.co`) && PathRegexp(`\\.(png|json)$`)"
      # - "traefik.http.routers.doday-pwa.entrypoints=websecure"
      # - "traefik.http.routers.doday-pwa.tls=true"
      # - "traefik.http.routers.doday-pwa.service=doday"

# Nur nötig, falls die Datei eigenständig genutzt wird – in der bestehenden
# Compose-Datei ist das Netzwerk "traefik" bereits deklariert.
networks:
  traefik:
    external: true
